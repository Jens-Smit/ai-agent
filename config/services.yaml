services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $appEnv: '%kernel.environment%'
            $geminiApiKey: '%env(GEMINI_API_KEY)%'
            $projectDir: '%kernel.project_dir%'
    
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../tests/'

    App\Controller\:
        resource: '../src/Controller'
        tags: ['controller.service_arguments']

    # ===== AI AGENT CONFIGURATION =====
    
    # Self-Developing Agent mit allen Dependencies
    App\Agent\SelfDevelopingAgent:
        arguments:
            $httpClient: '@http_client'
            $em: '@doctrine.orm.entity_manager'
            $taskRepository: '@App\Repository\AgentTaskRepository'
            $logger: '@logger'
            $geminiApiKey: '%env(GEMINI_API_KEY)%'
            $projectDir: '%kernel.project_dir%'
        tags:
            - { name: 'monolog.logger', channel: 'agent' }

    # Agent Controller
    App\Controller\AgentController:
        arguments:
            $agent: '@App\Agent\SelfDevelopingAgent'
            $taskRepository: '@App\Repository\AgentTaskRepository'

    # Agent Task Repository
    App\Repository\AgentTaskRepository:
        factory: ['@doctrine', 'getRepository']
        arguments:
            - 'App\Entity\AgentTask'

    # ===== HTTP CLIENT (für Gemini API & Tool Executor) =====
    http_client:
        class: Symfony\Component\HttpClient\HttpClient
        factory: ['Symfony\Component\HttpClient\HttpClient', 'create']
        arguments:
            -
                timeout: 60
                max_redirects: 3
                headers:
                    'User-Agent': 'Symfony-AI-Agent/2.0'

    # ===== EXISTING SERVICES =====
    
    App\Service\PostService:
        arguments:
            $em: '@Doctrine\ORM\EntityManagerInterface'
            $projectDir: '%kernel.project_dir%'
            $uploadDirectory: '%app.upload_directory%'
            $slugger: '@slugger'
            $apiUrl: '%env(API_URL)%'

    App\Service\PasswordService:
        arguments:
            $frontendUrl: '%env(FRONTEND_URL)%'

    App\Security\JwtTokenAuthenticator:
        arguments:
            $jwtManager: '@Lexik\Bundle\JWTAuthenticationBundle\Services\JWTTokenManagerInterface'
            $userProvider: '@security.user.provider.concrete.app_user_provider'
   
    App\Controller\ContactController:
        arguments:
            $contactFromEmail: '%env(CONTACT_FROM_EMAIL)%'
            $contactToEmail: '%env(CONTACT_TO_EMAIL)%'

    # ===== PARAMETERS =====
parameters:
    app.upload_directory: '%kernel.project_dir%/public/uploads'
    app.api_url: '%env(API_URL)%'