events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        root /var/www/public;
        index index.php index.html;

        # Swagger API Docs
        location /api/doc {
            proxy_hide_header Content-Security-Policy;
            try_files $uri /index.php$is_args$args;
        }

        # Swagger UI statische Dateien
        location /bundles/nelmioapidoc/swagger-ui/ {
            alias /var/www/public/bundles/nelmioapidoc/swagger-ui/;
            try_files $uri =404;

            add_header Content-Security-Policy "default-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';";
        }

        # Normaler Frontend / Symfony-Fallback
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass agent_host:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
        }
    }
}
